function heatColor(v, min, max) {
  if (v == null || isNaN(v)) return "#3a3a3a";
  var t = (v - min) / (max - min);
  t = Math.max(0, Math.min(1, t));
  // Cool→warm: blue (240) → cyan → green → yellow → red (0)
  var h = 240 * (1 - t);
  return "hsl(" + h + ",75%,50%)";
}

/* Shared audio context (created lazily, resumed on demand) */
var _audioCtx = null;
var _noiseBuffer = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
  }
  if (_audioCtx && _audioCtx.state === "suspended") { try { _audioCtx.resume(); } catch(e){} }
  return _audioCtx;
}
function getNoiseBuffer(ctx) {
  if (_noiseBuffer) return _noiseBuffer;
  var len = ctx.sampleRate * 2;
  _noiseBuffer = ctx.createBuffer(1, len, ctx.sampleRate);
  var d = _noiseBuffer.getChannelData(0);
  for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return _noiseBuffer;
}

/* Single bubble pop (used inside fizz) */
function _bubble(ctx, t, freq, amp) {
  var o = ctx.createOscillator();
  var g = ctx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(freq * 2.2, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(60, freq * 0.5), t + 0.08);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(amp, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + 0.14);
}

/* Carbonated fizz: hissing noise + many small bubble pops */
function playFizz() {
  var ctx = getAudioCtx(); if (!ctx) return;
  var t0 = ctx.currentTime;
  // Hiss layer: white noise through high-pass filter
  var src = ctx.createBufferSource(); src.buffer = getNoiseBuffer(ctx); src.loop = true;
  var hp = ctx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 1800; hp.Q.value = 0.7;
  var hg = ctx.createGain();
  hg.gain.setValueAtTime(0.0001, t0);
  hg.gain.exponentialRampToValueAtTime(0.05, t0 + 0.08);
  hg.gain.linearRampToValueAtTime(0.04, t0 + 1.4);
  hg.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.0);
  src.connect(hp); hp.connect(hg); hg.connect(ctx.destination);
  src.start(t0); src.stop(t0 + 2.05);
  // Bubble pops scattered in time
  for (var i = 0; i < 22; i++) {
    var bt = t0 + 0.05 + Math.random() * 1.7;
    var f = 180 + Math.random() * 520;
    _bubble(ctx, bt, f, 0.07 + Math.random() * 0.06);
  }
}

/* Explosion: low thump + filtered noise burst with downward sweep */
function playExplode() {
  var ctx = getAudioCtx(); if (!ctx) return;
  var t0 = ctx.currentTime;
  // Noise burst through dropping low-pass = "boom"
  var src = ctx.createBufferSource(); src.buffer = getNoiseBuffer(ctx);
  var lp = ctx.createBiquadFilter(); lp.type = "lowpass";
  lp.frequency.setValueAtTime(2400, t0);
  lp.frequency.exponentialRampToValueAtTime(180, t0 + 0.7);
  var ng = ctx.createGain();
  ng.gain.setValueAtTime(0.5, t0);
  ng.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.85);
  src.connect(lp); lp.connect(ng); ng.connect(ctx.destination);
  src.start(t0); src.stop(t0 + 0.9);
  // Sub-bass thump: sine sweep
  var o = ctx.createOscillator();
  var og = ctx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(140, t0);
  o.frequency.exponentialRampToValueAtTime(38, t0 + 0.5);
  og.gain.setValueAtTime(0.6, t0);
  og.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.55);
  o.connect(og); og.connect(ctx.destination);
  o.start(t0); o.stop(t0 + 0.6);
  // Crackle: high-passed noise tail
  var src2 = ctx.createBufferSource(); src2.buffer = getNoiseBuffer(ctx);
  var hp2 = ctx.createBiquadFilter(); hp2.type = "highpass"; hp2.frequency.value = 3500;
  var ng2 = ctx.createGain();
  ng2.gain.setValueAtTime(0.0001, t0);
  ng2.gain.exponentialRampToValueAtTime(0.18, t0 + 0.02);
  ng2.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.4);
  src2.connect(hp2); hp2.connect(ng2); ng2.connect(ctx.destination);
  src2.start(t0); src2.stop(t0 + 0.45);
}

/* Whoosh: rising-then-falling band-passed noise (combustion / flame burst) */
function playWhoosh() {
  var ctx = getAudioCtx(); if (!ctx) return;
  var t0 = ctx.currentTime;
  var src = ctx.createBufferSource(); src.buffer = getNoiseBuffer(ctx);
  var bp = ctx.createBiquadFilter(); bp.type = "bandpass"; bp.Q.value = 1.2;
  bp.frequency.setValueAtTime(400, t0);
  bp.frequency.exponentialRampToValueAtTime(2200, t0 + 0.35);
  bp.frequency.exponentialRampToValueAtTime(600, t0 + 1.0);
  var ng = ctx.createGain();
  ng.gain.setValueAtTime(0.0001, t0);
  ng.gain.exponentialRampToValueAtTime(0.18, t0 + 0.15);
  ng.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.1);
  src.connect(bp); bp.connect(ng); ng.connect(ctx.destination);
  src.start(t0); src.stop(t0 + 1.15);
}

/* Plop: low gentle splash for precipitation */
function playPlop() {
  var ctx = getAudioCtx(); if (!ctx) return;
  var t0 = ctx.currentTime;
  var o = ctx.createOscillator();
  var g = ctx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(520, t0);
  o.frequency.exponentialRampToValueAtTime(140, t0 + 0.18);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.18, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.25);
  o.connect(g); g.connect(ctx.destination);
  o.start(t0); o.stop(t0 + 0.28);
  // Tiny ripple noise
  var src = ctx.createBufferSource(); src.buffer = getNoiseBuffer(ctx);
  var lp = ctx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 800;
  var ng = ctx.createGain();
  ng.gain.setValueAtTime(0.04, t0); ng.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.3);
  src.connect(lp); lp.connect(ng); ng.connect(ctx.destination);
  src.start(t0); src.stop(t0 + 0.32);
}

/* Tick: short percussive click for UI taps */
function playTick() {
  var ctx = getAudioCtx(); if (!ctx) return;
  var t0 = ctx.currentTime;
  var o = ctx.createOscillator();
  var g = ctx.createGain();
  o.type = "triangle";
  o.frequency.setValueAtTime(900, t0);
  o.frequency.exponentialRampToValueAtTime(500, t0 + 0.04);
  g.gain.setValueAtTime(0.08, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);
  o.connect(g); g.connect(ctx.destination);
  o.start(t0); o.stop(t0 + 0.07);
}

/* Achievement: 3-note ascending arpeggio C-E-G */
function playAchievement() {
  var ctx = getAudioCtx(); if (!ctx) return;
  var t0 = ctx.currentTime;
  var notes = [523.25, 659.25, 783.99, 1046.50];
  notes.forEach(function(f, i) {
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = "triangle";
    o.frequency.value = f;
    var st = t0 + i * 0.09;
    g.gain.setValueAtTime(0.0001, st);
    g.gain.exponentialRampToValueAtTime(0.12, st + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, st + 0.3);
    o.connect(g); g.connect(ctx.destination);
    o.start(st); o.stop(st + 0.32);
  });
}

/* Router — keeps the existing playBeep(type) interface */
function playBeep(type) {
  try {
    if (type === "explode") return playExplode();
    if (type === "whoosh" || type === "combustion") return playWhoosh();
    if (type === "plop" || type === "precip") return playPlop();
    if (type === "achievement") return playAchievement();
    if (type === "fizz") return playFizz();
    return playTick();
  } catch (e) { /* silent */ }
}

/* ═══ HELPERS ═══ */
function findReaction(b) {
  if (b.length !== 2) return null;
  var ids = [b[0].id, b[1].id];
  return RXN.find(function(r) { return r.r.indexOf(ids[0]) !== -1 && r.r.indexOf(ids[1]) !== -1; }) || null;
}

function pHColor(pH) {
  if (pH === null) return "#666";
  if (pH <= 2) return "#ff1744"; if (pH <= 4) return "#ff5722"; if (pH <= 6) return "#ffab00";
  if (pH === 7) return "#76ff03"; if (pH <= 9) return "#00e5ff"; if (pH <= 11) return "#2979ff";
  return "#7c4dff";
}

function pHLabel(pH) {
  if (pH === null) return "N/A";
  if (pH <= 2) return "Strongly Acidic"; if (pH <= 6) return "Acidic";
  if (pH === 7) return "Neutral"; if (pH <= 11) return "Basic";
  return "Strongly Basic";
}

function parseProducts(eq) {

/* ═══ PARTICLES ═══ */
function useParticles() {
  var ref = useRef([]);
  var idRef = useRef(0);
  var rafRef = useRef(null);
  var [tick, setTick] = useState(0);

  var emit = useCallback(function(color, type, count) {
    for (var i = 0; i < (count||15); i++) {
      ref.current.push({
        id: idRef.current++, x: 45+Math.random()*10, y: 40+Math.random()*20,
        vx: (Math.random()-0.5)*(type==="explode"?10:3),
        vy: type==="explode"?-(Math.random()*10+2):-(Math.random()*4+1),
        sz: Math.random()*6+2, color: color, life: 1
      });
    }
    setTick(function(t){return t+1});
  }, []);

  useEffect(function() {
    if (!ref.current.length) return;
    var timer = setInterval(function() {
      ref.current = ref.current.map(function(p) {
        return { ...p, x:p.x+p.vx*0.25, y:p.y+p.vy*0.25+0.15, vy:p.vy+0.1, life:p.life-0.02, sz:p.sz*0.98 };
      }).filter(function(p) { return p.life > 0; });
      setTick(function(t){return t+1});
    }, 30);
    return function() { clearInterval(timer); };
  }, [tick > 0 ? 1 : 0]);

  return { particles: ref.current, emit: emit };
}

/* ═══ TRENDS GRAPH ═══ */
function TrendsGraph(props) {
  var prop = COLOR_PROPS[props.prop];
  var T = props.T;
  if (!prop || !prop.get) return null;
  var W = 340, H = 200;
  var pad = { l:36, r:10, t:14, b:24 };
  var iw = W - pad.l - pad.r, ih = H - pad.t - pad.b;

  var points = EL.map(function(e) { return { n:e.n, v:prop.get(e), cat:e.cat, s:e.s }; })
                 .filter(function(p) { return p.v != null && !isNaN(p.v); });
  if (!points.length) return <div style={{ color:T.textDim, fontSize:13, padding:20 }}>No data</div>;

  var vMin = Math.min.apply(null, points.map(function(p){return p.v}));
  var vMax = Math.max.apply(null, points.map(function(p){return p.v}));
  if (vMin === vMax) vMax = vMin + 1;
  var nMax = 118;

  function px(n) { return pad.l + (n / nMax) * iw; }
  function py(v) { return pad.t + ih - ((v - vMin) / (vMax - vMin)) * ih; }

  var yTicks = [vMin, (vMin+vMax)/2, vMax];
  var fmt = function(v) {
    var a = Math.abs(v);
    if (a >= 1000) return Math.round(v);
    if (a >= 10) return Math.round(v*10)/10;
    return Math.round(v*100)/100;
  };

  // Period boundaries
  var periodStarts = [3,11,19,37,55,87];
  var lineColor = T.isLight ? "#1976d2" : "#40c4ff";

  return (
    <svg width="100%" height={H} viewBox={"0 0 "+W+" "+H} preserveAspectRatio="xMidYMid meet">
      {/* Period bands */}
      {periodStarts.map(function(s, i) {
        return <line key={"ps"+i} x1={px(s)} y1={pad.t} x2={px(s)} y2={pad.t+ih} stroke={T.headerBorder} strokeWidth="0.5" strokeDasharray="2,3"/>;
      })}
      {/* Y grid + ticks */}
      {yTicks.map(function(v, i) {
        var y = py(v);
        return <g key={"yt"+i}>
          <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke={T.headerBorder} strokeWidth="0.5"/>
          <text x={pad.l-5} y={y+3} fontSize="9" fill={T.textDim} textAnchor="end" fontFamily="inherit">{fmt(v)}</text>
        </g>;
      })}
      {/* X ticks */}
      {[1,18,36,54,86,118].map(function(n, i) {
        var x = px(n);
        return <g key={"xt"+i}>
          <line x1={x} y1={pad.t+ih} x2={x} y2={pad.t+ih+3} stroke={T.headerBorder} strokeWidth="0.6"/>
          <text x={x} y={pad.t+ih+12} fontSize="9" fill={T.textDim} textAnchor="middle" fontFamily="inherit">{n}</text>
        </g>;
      })}
      {/* Connecting line */}
      <polyline points={points.map(function(p){return px(p.n)+","+py(p.v)}).join(" ")} fill="none" stroke={lineColor} strokeWidth="1" opacity="0.45"/>
      {/* Dots colored by category */}
      {points.map(function(p, i) {
        return <circle key={"d"+i} cx={px(p.n)} cy={py(p.v)} r="2.4" fill={CC[p.cat]||"#666"} stroke={T.isLight?"#fff":"#0a0e18"} strokeWidth="0.4"/>;
      })}
      {/* Axis labels */}
      <text x={W/2} y={H-2} fontSize="9" fill={T.textDim} textAnchor="middle" fontFamily="inherit">Atomic Number →</text>
      <text x={6} y={pad.t+ih/2} fontSize="9" fill={T.textDim} textAnchor="middle" fontFamily="inherit" transform={"rotate(-90 6 "+(pad.t+ih/2)+")"}>{prop.label}</text>
    </svg>
  );
}

/* ═══ COMPARE VIEW ═══ */
function CompareView(props) {
  var a = props.elements[0];
  var b = props.elements[1];
  var T = props.T;

  function row(label, av, bv, unit) {
    var aNum = (av==null||av==="?"||av==="Ancient")?null:parseFloat(av);
    var bNum = (bv==null||bv==="?"||bv==="Ancient")?null:parseFloat(bv);
    var aBig = aNum!=null && bNum!=null && aNum > bNum;
    var bBig = aNum!=null && bNum!=null && bNum > aNum;
    var aDisp = (av==null||av==="?")?"--":(av+(unit||""));
    var bDisp = (bv==null||bv==="?")?"--":(bv+(unit||""));
    return <div style={{ display:"grid",gridTemplateColumns:"1fr 96px 1fr",gap:5,marginBottom:5,alignItems:"center" }}>
      <div style={{ fontSize:12,fontWeight:700,color:aBig?"#00e676":(bBig?T.textDim:T.text),textAlign:"right" }}>{aDisp}</div>
      <div style={{ fontSize:10,color:T.textDim,textAlign:"center",fontWeight:700,letterSpacing:0.5 }}>{label}</div>
      <div style={{ fontSize:12,fontWeight:700,color:bBig?"#00e676":(aBig?T.textDim:T.text) }}>{bDisp}</div>
    </div>;
  }

  return (
    <div>
      <div style={{ display:"flex",alignItems:"center",marginBottom:14 }}>
        <div style={{ flex:1,textAlign:"center",paddingRight:6 }}>
          <div style={{ fontSize:12,color:T.textDim }}>#{a.n}</div>
          <div style={{ fontSize:34,fontWeight:900,color:CC[a.cat],lineHeight:1 }}>{a.s}</div>
          <div style={{ fontSize:14,color:T.text,marginTop:2 }}>{a.name}</div>
          <div style={{ fontSize:10,padding:"2px 6px",borderRadius:4,display:"inline-block",marginTop:4,background:(CC[a.cat]||"#666")+"22",color:CC[a.cat],border:"1px solid "+(CC[a.cat]||"#666")+"44" }}>{a.cat}</div>
        </div>
        <div style={{ fontSize:17,color:T.textDim,fontWeight:700,padding:"0 4px" }}>VS</div>
        <div style={{ flex:1,textAlign:"center",paddingLeft:6 }}>
          <div style={{ fontSize:12,color:T.textDim }}>#{b.n}</div>
          <div style={{ fontSize:34,fontWeight:900,color:CC[b.cat],lineHeight:1 }}>{b.s}</div>
          <div style={{ fontSize:14,color:T.text,marginTop:2 }}>{b.name}</div>
          <div style={{ fontSize:10,padding:"2px 6px",borderRadius:4,display:"inline-block",marginTop:4,background:(CC[b.cat]||"#666")+"22",color:CC[b.cat],border:"1px solid "+(CC[b.cat]||"#666")+"44" }}>{b.cat}</div>
        </div>
      </div>
      <div style={{ background:T.surfaceAlt,borderRadius:7,padding:8 }}>
        {row("Atomic Mass", a.m, b.m, " u")}
        {row("Group / Period", a.col+"/"+a.row, b.col+"/"+b.row, "")}
        {row("Electronegativity", a.en, b.en, "")}
        {row("Atomic Radius", a.ar, b.ar, " pm")}
        {row("Ionization E.", a.ie, b.ie, " kJ/mol")}
        {row("Melting Pt", a.mp!=null&&a.mp!==-1?a.mp:null, b.mp!=null&&b.mp!==-1?b.mp:null, "°C")}
        {row("Boiling Pt", a.bp!=null&&a.bp!==-1?a.bp:null, b.bp!=null&&b.bp!==-1?b.bp:null, "°C")}
        {row("Density", a.d, b.d, " g/cm³")}
        {row("Discovered", a.disc===-1?"Ancient":String(a.disc), b.disc===-1?"Ancient":String(b.disc), "")}
      </div>
    </div>
  );
}

/* ═══ PERIODIC TABLE COMPONENT ═══ */
function PTView(props) {
  var T = props.T || themeStyles("dark");
  var [sel, setSel] = useState(null);
  var [search, setSearch] = useState("");
  var [catF, setCatF] = useState(null);
  var [colorMode, setColorMode] = useState("category");
  var [compareMode, setCompareMode] = useState(false);
  var [compare, setCompare] = useState([]);
  var [showCompare, setShowCompare] = useState(false);
  var [showTrends, setShowTrends] = useState(false);
  var [trendProp, setTrendProp] = useState("en");

  // Back handler refs (top of stack — closes modals first)
  var selRef = useRef(sel);
  var showCompareRef = useRef(showCompare);
  var showTrendsRef = useRef(showTrends);
  var compareModeRef = useRef(compareMode);
  var compareLenRef = useRef(compare.length);
  var catFRef = useRef(catF);
  var searchRef = useRef(search);
  useEffect(function() { selRef.current = sel; }, [sel]);
  useEffect(function() { showCompareRef.current = showCompare; }, [showCompare]);
  useEffect(function() { showTrendsRef.current = showTrends; }, [showTrends]);
  useEffect(function() { compareModeRef.current = compareMode; }, [compareMode]);
  useEffect(function() { compareLenRef.current = compare.length; }, [compare.length]);
  useEffect(function() { catFRef.current = catF; }, [catF]);
  useEffect(function() { searchRef.current = search; }, [search]);

  useEffect(function() {
    return window.pushBackHandler(function() {
      if (showTrendsRef.current) { setShowTrends(false); return true; }
      if (showCompareRef.current) { setShowCompare(false); return true; }
      if (selRef.current) { setSel(null); return true; }
      if (compareModeRef.current && compareLenRef.current > 0) { setCompare([]); return true; }
      if (compareModeRef.current) { setCompareMode(false); return true; }
      if (catFRef.current) { setCatF(null); return true; }
      if (searchRef.current) { setSearch(""); return true; }
      return false;
    });
  }, []);

  var highlighted = null;
  if (search) {
    var s = search.toLowerCase();
    highlighted = {};
    EL.forEach(function(e) { if (e.name.toLowerCase().indexOf(s)!==-1 || e.s.toLowerCase().indexOf(s)!==-1 || String(e.n)===search) highlighted[e.n]=true; });
  } else if (catF) {
    highlighted = {};
    EL.forEach(function(e) { if (e.cat === catF) highlighted[e.n] = true; });
  }

  function getColor(el) {
    if (colorMode === "category") return CC[el.cat] || "#666";
    var prop = COLOR_PROPS[colorMode];
    if (!prop || !prop.get) return CC[el.cat] || "#666";
    return heatColor(prop.get(el), prop.min, prop.max);
  }

  function handleClick(el) {
    if (compareMode) {
      setCompare(function(prev) {
        if (prev.find(function(p){return p.n===el.n})) return prev.filter(function(p){return p.n!==el.n});
        if (prev.length >= 2) return [prev[1], el];
        var next = prev.concat(el);
        if (next.length === 2) setTimeout(function(){setShowCompare(true)}, 150);
        return next;
      });
    } else {
      setSel(el);
    }
  }

  var compareIds = {};
  compare.forEach(function(e){compareIds[e.n]=true});

  var cells = [];
  for (var row = 1; row <= 10; row++) {
    for (var col = 1; col <= 18; col++) {
      if (row === 6 && col === 3) {
        cells.push({ key: row+"-"+col, marker: "La-Lu", cat: "Lanthanide" });
      } else if (row === 7 && col === 3) {
        cells.push({ key: row+"-"+col, marker: "Ac-Lr", cat: "Actinide" });
      } else {
        var el = null;
        for (var i = 0; i < EL.length; i++) { if (EL[i].row === row && EL[i].col === col) { el = EL[i]; break; } }
        cells.push({ key: row+"-"+col, el: el });
      }
    }
  }

  var activeProp = COLOR_PROPS[colorMode];

  return (
    <div style={{ padding: "10px 8px", paddingBottom: 30 }}>
      <input value={search} onChange={function(e){setSearch(e.target.value)}} placeholder="Search element..." style={{ width:"100%",padding:"7px 10px",borderRadius:8,border:"1px solid "+T.headerBorder,background:T.surfaceAlt,color:T.text,fontSize:14,fontFamily:"inherit",outline:"none",marginBottom:6 }} />

      {/* Mode toolbar: compare + trends */}
      <div style={{ display:"flex",gap:4,marginBottom:6 }}>
        <button onClick={function(){setCompareMode(!compareMode);if(compareMode)setCompare([])}} style={{ flex:1,padding:"5px 6px",borderRadius:6,fontSize:11,fontWeight:700,fontFamily:"inherit",cursor:"pointer",background:compareMode?"rgba(0,230,118,.12)":T.surfaceAlt,border:"1px solid "+(compareMode?"rgba(0,230,118,.4)":T.headerBorder),color:compareMode?"#00e676":T.textDim }}>{compareMode?"⚖ COMPARE ON ("+compare.length+"/2)":"⚖ Compare"}</button>
        <button onClick={function(){setShowTrends(true)}} style={{ flex:1,padding:"5px 6px",borderRadius:6,fontSize:11,fontWeight:700,fontFamily:"inherit",cursor:"pointer",background:T.surfaceAlt,border:"1px solid "+T.headerBorder,color:"#40c4ff" }}>📈 Trends</button>
        {compareMode && compare.length>0 && <button onClick={function(){setCompare([])}} style={{ padding:"5px 8px",borderRadius:6,fontSize:11,fontWeight:700,fontFamily:"inherit",cursor:"pointer",background:"rgba(255,80,80,.08)",border:"1px solid rgba(255,80,80,.25)",color:"#ef5350" }}>Clear</button>}
      </div>

      {/* Color-by-property picker */}
      <div style={{ display:"flex",alignItems:"center",gap:4,marginBottom:6,flexWrap:"wrap" }}>
        <span style={{ fontSize:13,color:T.textDim,fontWeight:800,letterSpacing:0.5 }}>COLOR:</span>
        {Object.keys(COLOR_PROPS).map(function(k) {
          var on = colorMode === k;
          return <button key={k} onClick={function(){setColorMode(k)}} style={{ padding:"6px 11px",borderRadius:12,fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer",background:on?"rgba(64,196,255,.15)":T.surfaceAlt,border:"1px solid "+(on?"rgba(64,196,255,.4)":T.headerBorder),color:on?"#40c4ff":T.textDim,whiteSpace:"nowrap" }}>{COLOR_PROPS[k].label}</button>;
        })}
      </div>

      {/* Heat scale legend (shown when not in category mode) */}
      {colorMode !== "category" && activeProp && (
        <div style={{ marginBottom:6,padding:"5px 7px",background:T.surfaceAlt,borderRadius:6,border:"1px solid "+T.headerBorder }}>
          <div style={{ display:"flex",justifyContent:"space-between",fontSize:10,color:T.textDim,fontWeight:700,marginBottom:3 }}>
            <span>{activeProp.min}{activeProp.unit}</span>
            <span style={{ color:T.text }}>{activeProp.label}</span>
            <span>{activeProp.max}{activeProp.unit}</span>
          </div>
          <div style={{ height:6,borderRadius:3,background:"linear-gradient(90deg,hsl(240,75%,50%),hsl(180,75%,50%),hsl(120,75%,50%),hsl(60,75%,50%),hsl(0,75%,50%))" }}/>
        </div>
      )}

      {/* Category filter pills */}
      <div style={{ display:"flex",flexWrap:"wrap",gap:5,marginBottom:8 }}>
        {Object.keys(CC).map(function(c) {
          return <button key={c} onClick={function(){setCatF(catF===c?null:c)}} style={{ padding:"6px 12px",borderRadius:14,fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer",background:catF===c?CC[c]+"33":T.surfaceAlt,border:"1px solid "+(catF===c?CC[c]+"66":T.borderSoft),color:catF===c?CC[c]:T.textDim }}>{c}</button>;
        })}
      </div>

      {/* The grid */}
      <div style={{ overflowX:"auto",paddingBottom:6 }}>
        <div style={{ display:"grid",gridTemplateColumns:"repeat(18,1fr)",gap:1.5,minWidth:540 }}>
          {cells.map(function(cell) {
            if (cell.marker) {
              var mc = CC[cell.cat];
              return <button key={cell.key} onClick={function(){setCatF(catF===cell.cat?null:cell.cat)}} style={{ aspectRatio:"1",minWidth:0,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontFamily:"inherit",cursor:"pointer",background:mc+"22",border:"1px solid "+mc+"33",color:mc,padding:0 }}>{cell.marker}</button>;
            }
            if (!cell.el) return <div key={cell.key} style={{ aspectRatio:"1" }} />;
            var e = cell.el;
            var dim = highlighted && !highlighted[e.n];
            var c = getColor(e);
            var picked = compareIds[e.n];
            // Heat-mode cells: solid bg with white text for contrast
            var heatMode = colorMode !== "category";
            var bg, brd, txt;
            if (dim) { bg = T.surfaceAlt; brd = T.borderSoft; txt = T.textMute; }
            else if (heatMode) { bg = c; brd = c; txt = "#fff"; }
            else { bg = c+"18"; brd = c+"44"; txt = c; }
            if (picked) { brd = "#00e676"; }
            return <button key={cell.key} onClick={function(){handleClick(e)}} style={{ aspectRatio:"1",minWidth:0,borderRadius:3,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"inherit",padding:0,cursor:"pointer",background:bg,border:(picked?"2px solid #00e676":"1px solid "+brd),opacity:dim?0.18:1,color:txt,boxShadow:picked?"0 0 6px rgba(0,230,118,.6)":"none" }}>
              <span style={{ fontSize:8,opacity:0.7 }}>{e.n}</span>
              <span style={{ fontSize:12,fontWeight:800 }}>{e.s}</span>
            </button>;
          })}
        </div>
      </div>

      {/* Element detail modal */}
      {sel && (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20 }} onClick={function(){setSel(null)}}>
          <div onClick={function(e){e.stopPropagation()}} style={{ background:T.isLight?"#fff":"#0d1117",border:"2px solid "+(CC[sel.cat]||"#444"),borderRadius:16,padding:20,maxWidth:340,width:"100%",maxHeight:"80vh",overflowY:"auto" }}>
            <div style={{ display:"flex",justifyContent:"space-between",marginBottom:12 }}>
              <div>
                <span style={{ fontSize:14,color:T.textDim }}>#{sel.n}</span>
                <h2 style={{ fontSize:26,fontWeight:900,margin:"2px 0",color:CC[sel.cat] }}>{sel.s}</h2>
                <h3 style={{ fontSize:16,fontWeight:600,margin:0,color:T.text }}>{sel.name}</h3>
                <div style={{ fontSize:11,padding:"2px 7px",borderRadius:4,display:"inline-block",marginTop:4,background:(CC[sel.cat]||"#666")+"22",color:CC[sel.cat],border:"1px solid "+(CC[sel.cat]||"#666")+"44" }}>{sel.cat}</div>
              </div>
              <button onClick={function(){setSel(null)}} style={{ background:T.surfaceAlt,border:"none",borderRadius:8,width:28,height:28,color:T.textDim,fontSize:17,cursor:"pointer" }}>X</button>
            </div>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:10 }}>
              {[["Mass",sel.m+" u"],["MP",sel.mp!=null&&sel.mp!==-1?sel.mp+"°C":"?"],["BP",sel.bp!=null&&sel.bp!==-1?sel.bp+"°C":"?"],["Density",sel.d+" g/cm³"],["Electroneg.",sel.en!=null?sel.en:"?"],["At. Radius",sel.ar!=null?sel.ar+" pm":"?"],["Ionization E.",sel.ie!=null?sel.ie+" kJ/mol":"?"],["Disc.",sel.disc===-1?"Ancient":String(sel.disc)],["Config",sel.config]].map(function(pair,i) {
                return <div key={i} style={{ background:T.surfaceAlt,borderRadius:5,padding:"5px 7px" }}>
                  <div style={{ fontSize:9,color:T.textDim,fontWeight:700 }}>{pair[0]}</div>
                  <div style={{ fontSize:13,color:T.text,fontWeight:600 }}>{pair[1]}</div>
                </div>;
              })}
            </div>
            <div style={{ background:"rgba(255,215,0,.06)",border:"1px solid rgba(255,215,0,.18)",borderRadius:7,padding:8 }}>
              <div style={{ fontSize:10,color:"#ffd700",fontWeight:700,marginBottom:2 }}>FUN FACT</div>
              <p style={{ fontSize:13,color:T.text,lineHeight:1.5,margin:0 }}>{sel.fact}</p>
            </div>
          </div>
        </div>
      )}

      {/* Compare modal */}
      {showCompare && compare.length === 2 && (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20 }} onClick={function(){setShowCompare(false)}}>
          <div onClick={function(e){e.stopPropagation()}} style={{ background:T.isLight?"#fff":"#0d1117",border:"2px solid #00e676",borderRadius:16,padding:18,maxWidth:380,width:"100%",maxHeight:"85vh",overflowY:"auto" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
              <div style={{ fontSize:13,fontWeight:800,color:"#00e676",letterSpacing:1 }}>⚖ COMPARE</div>
              <button onClick={function(){setShowCompare(false)}} style={{ background:T.surfaceAlt,border:"none",borderRadius:8,width:28,height:28,color:T.textDim,fontSize:17,cursor:"pointer" }}>X</button>
            </div>
            <CompareView elements={compare} T={T}/>
            <div style={{ fontSize:10,color:T.textDim,marginTop:8,textAlign:"center",fontStyle:"italic" }}>Green highlights the larger value</div>
          </div>
        </div>
      )}

      {/* Trends modal */}
      {showTrends && (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:14 }} onClick={function(){setShowTrends(false)}}>
          <div onClick={function(e){e.stopPropagation()}} style={{ background:T.isLight?"#fff":"#0d1117",border:"2px solid #40c4ff",borderRadius:16,padding:14,maxWidth:400,width:"100%",maxHeight:"90vh",overflowY:"auto" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
              <div style={{ fontSize:13,fontWeight:800,color:"#40c4ff",letterSpacing:1 }}>📈 PERIODIC TRENDS</div>
              <button onClick={function(){setShowTrends(false)}} style={{ background:T.surfaceAlt,border:"none",borderRadius:8,width:28,height:28,color:T.textDim,fontSize:17,cursor:"pointer" }}>X</button>
            </div>
            <div style={{ display:"flex",gap:3,flexWrap:"wrap",marginBottom:8 }}>
              {Object.keys(COLOR_PROPS).filter(function(k){return k!=="category"}).map(function(k) {
                var on = trendProp === k;
                return <button key={k} onClick={function(){setTrendProp(k)}} style={{ padding:"4px 7px",borderRadius:5,fontSize:10,fontWeight:700,fontFamily:"inherit",cursor:"pointer",background:on?"rgba(64,196,255,.15)":T.surfaceAlt,border:"1px solid "+(on?"rgba(64,196,255,.4)":T.headerBorder),color:on?"#40c4ff":T.textDim }}>{COLOR_PROPS[k].label}</button>;
              })}
            </div>
            <div style={{ background:T.surfaceAlt,borderRadius:8,padding:6,border:"1px solid "+T.headerBorder }}>
              <TrendsGraph prop={trendProp} T={T}/>
            </div>
            <div style={{ fontSize:11,color:T.textDim,marginTop:8,lineHeight:1.5 }}>
              <strong style={{ color:T.text }}>How to read:</strong> Each dot = one element (colored by category). Vertical dashed lines mark new periods (rows). Notice how properties oscillate periodically — that's the basis of the periodic law.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  var [soundOn, setSoundOn] = useState(true);
  var [timedActive, setTimedActive] = useState(false);
  var [timedTime, setTimedTime] = useState(60);
  var [timedFound, setTimedFound] = useState([]);
  var [timedBest, setTimedBest] = useState(null);
  var prevAchCount = useRef(0);

  var { particles, emit } = useParticles();
  var reaction = findReaction(bench);
  var filtered = filter === "All" ? ITEMS : ITEMS.filter(function(i){return i.tag===filter});

  // Refs for back handler (so it always sees latest state)
  var tabRef = useRef(tab);
  var benchRef = useRef(bench);
  var resultRef = useRef(result);
  useEffect(function() { tabRef.current = tab; }, [tab]);
  useEffect(function() { benchRef.current = bench; }, [bench]);
  useEffect(function() { resultRef.current = result; }, [result]);

  // Back handler: tab→lab, then result/bench→clear
  useEffect(function() {
    return window.pushBackHandler(function() {
      if (tabRef.current !== "lab") { setTab("lab"); return true; }
      if (resultRef.current) { clearAll(); return true; }
      if (benchRef.current.length > 0) { clearAll(); return true; }
      return false; // bubble down to App handler (lab → menu)
    });
  }, []);

  var totalScore = log.reduce(function(sum, key) {
    var r = RXN.find(function(x){return x.r.slice().sort().join("+")===key});
    return sum + (r ? r.score : 0);
  }, 0);

  var earnedAch = ACHIEVEMENTS.filter(function(a){return a.check(log)});

  useEffect(function() {
    if (earnedAch.length > prevAchCount.current && prevAchCount.current > 0) {
      var newest = earnedAch[earnedAch.length - 1];
      setNewAch(newest);
      if (soundOn) playBeep("achievement");
      setTimeout(function(){setNewAch(null)}, 3000);
    }
    prevAchCount.current = earnedAch.length;
  });

  useEffect(function() {
    if (!timedActive) return;
    if (timedTime <= 0) {
      setTimedActive(false);
      if (!timedBest || timedFound.length > timedBest) setTimedBest(timedFound.length);
      return;
    }
    var t = setTimeout(function(){setTimedTime(function(v){return v-1})}, 1000);
    return function(){clearTimeout(t)};
  }, [timedActive, timedTime]);

  var hints = bench.length === 1 ? RXN.filter(function(r){return r.r.indexOf(bench[0].id)!==-1}).map(function(r){return r.r[0]===bench[0].id?r.r[1]:r.r[0]}) : [];

  function addItem(item) {
    if (bench.length >= 2 || bench.find(function(b){return b.id===item.id})) return;
    setBench(function(p){return p.concat(item)});
    setResult(null); setDone(false);
    if (soundOn) playBeep("tick");
  }

  function removeItem(id) {
    setBench(function(p){return p.filter(function(b){return b.id!==id})});
    setResult(null); setDone(false);
  }

  function clearAll() { setBench([]); setResult(null); setDone(false); setRunning(false); }

  function runExperiment() {
    if (!reaction || running) return;
    var rxn = reaction;
    setRunning(true); setResult(null); setDone(false);
    var boom = rxn.anim === "explode";
    if (soundOn) {
      // Pick the best sound for the reaction type
      var snd = "fizz";
      if (boom && rxn.type === "combustion") snd = "whoosh";
      else if (boom) snd = "explode";
      else if (rxn.type === "precipitation") snd = "plop";
      else if (rxn.type === "combustion") snd = "whoosh";
      playBeep(snd);
      // Layer a soft fizz behind explosions for richer texture
      if (boom) setTimeout(function(){ playBeep("fizz"); }, 120);
    }
    emit(rxn.color, rxn.anim, boom ? 30 : 15);
    if (boom) {
      setTimeout(function(){emit("#ff6600","explode",10)}, 350);
      setTimeout(function(){emit("#ffcc00","explode",8)}, 650);
    }
    setTimeout(function() {
      setRunning(false); setDone(true); setResult(rxn);
      var key = rxn.r.slice().sort().join("+");
      setLog(function(prev){return prev.indexOf(key)!==-1?prev:prev.concat(key)});
      var mc = CHALLENGES.filter(function(ch){return ch.target===key}).map(function(ch){return ch.id});
      if (mc.length) setCDone(function(prev){var n=prev.slice();mc.forEach(function(id){if(n.indexOf(id)===-1)n.push(id)});return n});
      if (timedActive) setTimedFound(function(prev){return prev.indexOf(key)!==-1?prev:prev.concat(key)});
    }, 2200);
  }

  function startTimed() { setTimedActive(true); setTimedTime(60); setTimedFound([]); clearAll(); }

  var rxnCount = function(id){return RXN.filter(function(r){return r.r.indexOf(id)!==-1}).length};

  var B = function(p) {
    return {padding:p||"3px 8px",borderRadius:5,fontSize:12,fontFamily:"inherit",cursor:"pointer",border:"1px solid rgba(255,255,255,.08)"};
  };

  return (
    <div style={{ minHeight:"100vh",background:T.bg,fontFamily:"'SF Mono','Fira Code','Courier New',monospace",color:T.text,paddingBottom:40 }}>
      <style>{CSS}</style>

      {newAch && <div style={{ position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",zIndex:200,background:"linear-gradient(135deg,rgba(255,215,0,.18),rgba(255,215,0,.06))",border:"1px solid rgba(255,215,0,.4)",borderRadius:12,padding:"10px 20px",display:"flex",alignItems:"center",gap:10,animation:"slideDown .4s ease-out",backdropFilter:"blur(10px)" }}>
        <span style={{ fontSize:28 }}>{newAch.icon}</span>
        <div><div style={{ fontSize:14,fontWeight:800,color:"#ffd700" }}>Achievement Unlocked!</div><div style={{ fontSize:13,color:T.text }}>{newAch.title}</div></div>
      </div>}

      <header style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",borderBottom:"1px solid "+T.headerBorder,background:T.headerBg,position:"sticky",top:0,zIndex:20,backdropFilter:"blur(12px)" }}>
        <div style={{ display:"flex",alignItems:"center",gap:8 }}>
          <span style={{ fontSize:20 }}>{"🧪"}</span>
          <div>
            <h1 style={{ fontSize:17,fontWeight:800,margin:0,background:"linear-gradient(90deg,#00e676,#40c4ff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent" }}>Lab Craft</h1>
            <p style={{ fontSize:10,color:T.textDim,margin:0 }}>{log.length}/{RXN.length} found | {totalScore} pts | {earnedAch.length} badges</p>
          </div>
        </div>
        <div style={{ display:"flex",gap:4 }}>
          <button onClick={function(){setTheme(theme==="dark"?"light":"dark")}} title="Toggle theme" style={{ ...B(),color:T.isLight?"#ff9100":"#ffd54f",background:T.isLight?"rgba(255,145,0,.08)":"rgba(255,213,79,.08)",borderColor:T.isLight?"rgba(255,145,0,.25)":"rgba(255,213,79,.25)" }}>{T.isLight?"☀":"🌙"}</button>
          <button onClick={function(){setSoundOn(!soundOn)}} style={{ ...B(),color:soundOn?"#00e676":T.textDim,background:soundOn?"rgba(0,230,118,.08)":T.surfaceAlt }}>{soundOn?"ON":"OFF"}</button>
          <button onClick={clearAll} style={{ ...B(),color:"#ef5350",borderColor:"rgba(255,80,80,.2)",background:"rgba(255,80,80,.08)" }}>Clear</button>
        </div>
      </header>

      {timedActive && <div style={{ background:"linear-gradient(90deg,rgba(255,23,68,.1),rgba(255,215,0,.1))",borderBottom:"1px solid rgba(255,215,0,.2)",padding:"6px 14px",display:"flex",alignItems:"center",justifyContent:"space-between" }}>
        <div style={{ fontSize:13,fontWeight:700,color:"#ffd700" }}>TIMED {timedTime}s | {timedFound.length} found</div>
        <button onClick={function(){setTimedActive(false);if(!timedBest||timedFound.length>timedBest)setTimedBest(timedFound.length)}} style={{ ...B(),color:"#ef5350",borderColor:"rgba(255,80,80,.3)",background:"rgba(255,80,80,.1)" }}>Stop</button>
      </div>}

      <div style={{ display:"flex",borderBottom:"1px solid "+T.headerBorder,overflowX:"auto" }}>
        {[["lab","Lab"],["periodic","Table"],["log","Log "+log.length],["challenge","Quests "+cDone.length],["badges","Badges "+earnedAch.length],["stats","Stats"]].map(function(pair) {
          return <button key={pair[0]} onClick={function(){setTab(pair[0])}} style={{ flex:1,padding:"12px 4px",fontSize:14,fontWeight:700,fontFamily:"inherit",cursor:"pointer",border:"none",borderBottom:tab===pair[0]?"2px solid #00e676":"2px solid transparent",background:"transparent",color:tab===pair[0]?"#00e676":T.textDim,whiteSpace:"nowrap",minWidth:0 }}>{pair[1]}</button>;
        })}
      </div>

      {tab === "periodic" && <PTView T={T}/>}

      {tab === "lab" && <div>
        <div style={{ display:"flex",gap:3,padding:"6px 14px 2px",overflowX:"auto" }}>
          {LTAGS.map(function(t){return <button key={t} onClick={function(){setFilter(t)}} style={{ padding:"7px 14px",borderRadius:18,fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer",whiteSpace:"nowrap",background:filter===t?"rgba(0,230,118,.14)":T.surfaceAlt,border:"1px solid "+(filter===t?"rgba(0,230,118,.4)":T.borderSoft),color:filter===t?"#00e676":T.textDim }}>{t}</button>})}
        </div>
        <div style={{ padding:"3px 14px 0" }}>
          <div style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4 }}>
            {filtered.map(function(item) {
              var onB = !!bench.find(function(b){return b.id===item.id});
              var isH = hints.indexOf(item.id) !== -1;
              return <button key={item.id} onClick={function(){addItem(item)}} disabled={onB||bench.length>=2} style={{ background:isH?"rgba(0,230,118,.1)":onB?"rgba(0,230,118,.06)":"rgba(255,255,255,.02)",border:"1.5px solid "+(isH?"#00e67666":onB?"#00e67633":"rgba(255,255,255,.04)"),borderRadius:8,padding:"5px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:1,fontFamily:"inherit",opacity:onB?0.3:bench.length>=2&&!isH?0.4:1,cursor:onB||bench.length>=2?"default":"pointer",animation:isH?"hintPulse 1.5s infinite":"none" }}>
                <span style={{ fontSize:16 }}>{item.icon}</span>
                <span style={{ fontSize:11,fontWeight:700,color:item.color }}>{item.name}</span>
                <span style={{ fontSize:9,color:T.textMute }}>{rxnCount(item.id)}</span>
                {isH && <span style={{ fontSize:8,color:"#00e676" }}>{"✓"}</span>}
              </button>;
            })}
          </div>
        </div>

        <div style={{ display:"flex",justifyContent:"center",gap:6,padding:"5px 14px 0" }}>
          <button onClick={function(){setHeat(!heat)}} style={{ padding:"4px 10px",borderRadius:14,fontSize:11,fontWeight:600,fontFamily:"inherit",cursor:"pointer",background:heat?"rgba(255,106,0,.12)":"rgba(255,255,255,.02)",border:"1px solid "+(heat?"rgba(255,106,0,.3)":"rgba(255,255,255,.04)"),color:heat?"#ff6a00":T.textMute }}>{heat?"Burner ON":"Burner OFF"}</button>
          {!timedActive && <button onClick={function(){startTimed();setTab("lab")}} style={{ padding:"4px 10px",borderRadius:14,fontSize:11,fontWeight:600,fontFamily:"inherit",cursor:"pointer",background:"rgba(255,215,0,.08)",border:"1px solid rgba(255,215,0,.2)",color:"#ffd700" }}>60s Challenge</button>}
        </div>

        <div style={{ margin:"5px 14px 0",background:T.beakerBg,border:"1.5px solid "+T.headerBorder,borderRadius:12,padding:"10px 8px",position:"relative",overflow:"hidden" }}>
          <div style={{ display:"flex",alignItems:"flex-start",justifyContent:"center",gap:6,position:"relative",zIndex:2,flexWrap:"wrap" }}>
            {[0,1].map(function(i) {
              var item = bench[i];
              if (item) return <div key={i} style={{ width:72 }}>
                <div onClick={function(){removeItem(item.id)}} style={{ background:item.color+"08",border:"1.5px solid "+item.color+"44",borderRadius:10,padding:"7px 2px",textAlign:"center",cursor:"pointer",position:"relative",animation:"popIn .3s" }}>
                  <div style={{ position:"absolute",top:-4,right:-4,width:14,height:14,borderRadius:"50%",background:"#ef5350",color:"#fff",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center" }}>x</div>
                  <div style={{ fontSize:20 }}>{item.icon}</div>
                  <div style={{ fontSize:11,fontWeight:700,color:item.color }}>{item.name}</div>
                </div>
              </div>;
              return <div key={i} style={{ width:72 }}>
                <div style={{ border:"1.5px dashed "+T.headerBorder,borderRadius:10,padding:"12px 2px",textAlign:"center" }}>
                  <div style={{ fontSize:17,color:T.textMute }}>+</div>
                </div>
              </div>;
            })}
            <div style={{ fontSize:17,color:T.textMute,alignSelf:"center" }}>{">"}</div>
            <div style={{ display:"flex",alignItems:"flex-end",gap:4 }}>
              <Beaker bench={bench} running={running} done={done} color={result?result.color:(reaction?reaction.color:T.textDim)} T={T}/>
              <Thermometer temp={result?result.temp:(reaction?reaction.temp:null)} active={running||done} T={T}/>
            </div>
          </div>
          {particles.map(function(p) {
            return <div key={p.id} style={{ position:"absolute",left:p.x+"%",top:p.y+"%",width:p.sz,height:p.sz,borderRadius:"50%",background:p.color,opacity:p.life,pointerEvents:"none",boxShadow:"0 0 "+p.sz+"px "+p.color+"88",zIndex:10 }} />;
          })}
          <div style={{ textAlign:"center",fontSize:12,marginTop:8,minHeight:12,zIndex:2,position:"relative" }}>
            {bench.length===0 && <span style={{ color:T.textDim }}>Tap 2 chemicals above</span>}
            {bench.length===1 && <span style={{ color:T.textDim }}>Pick one more <span style={{ color:"#00e676",fontSize:10 }}>(green = compatible)</span></span>}
            {bench.length===2 && !reaction && <span style={{ color:"#ef5350" }}>No reaction - try different combo!</span>}
            {bench.length===2 && reaction && !running && !done && <span style={{ color:"#00e676" }}>{reaction.name}</span>}
            {running && <span style={{ color:"#ffc107" }}>Reacting...</span>}
            {done && <span style={{ color:"#00e676" }}>Results below</span>}
          </div>
          <button onClick={runExperiment} disabled={!reaction||running||done} style={{ width:"100%",padding:10,border:"none",borderRadius:8,fontSize:13,fontWeight:800,letterSpacing:".06em",fontFamily:"inherit",marginTop:5,background:reaction&&!running&&!done?"linear-gradient(135deg,#00e676,#00c853)":T.surfaceAlt,color:reaction&&!running&&!done?"#000":T.textDim,cursor:reaction&&!running&&!done?"pointer":"default" }}>
            {running ? "REACTING..." : done ? "DONE" : reaction ? "MIX & REACT" : "SELECT 2 ITEMS"}
          </button>
        </div>

        {result && <div style={{ margin:"8px 14px 0",background:T.isLight?"rgba(255,255,255,.85)":"rgba(6,10,18,.9)",border:"1px solid "+T.headerBorder,borderRadius:12,padding:10,animation:"fadeUp .5s ease-out" }}>
          <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:8 }}>
            <div style={{ width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#00e676,#00c853)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
              <span style={{ fontSize:17,fontWeight:900,color:"#000" }}>{result.score}</span>
            </div>
            <div>
              <h2 style={{ fontSize:14,fontWeight:800,margin:0,color:T.text }}>{result.name}</h2>
              <div style={{ display:"inline-block",fontSize:9,padding:"2px 6px",borderRadius:4,marginTop:2,background:result.color+"15",color:result.color,border:"1px solid "+result.color+"28",fontWeight:600 }}>{result.type.replace("_"," ")}</div>
            </div>
          </div>
          <div style={{ background:"rgba(0,230,118,.04)",border:"1px solid rgba(0,230,118,.1)",borderRadius:6,padding:7,marginBottom:5 }}>
            <div style={{ fontSize:9,color:"#00e676",fontWeight:700 }}>EQUATION</div>
            <div style={{ fontSize:13,color:T.isLight?"#2e7d32":"#a5d6a7",marginTop:2 }}>{result.eq}</div>
          </div>

          {/* Molecule 3D-style view of products */}
          {(function() {
            var prods = parseProducts(result.eq);
            if (!prods.length) return null;
            return (
              <div style={{ background:T.isLight?"rgba(64,196,255,.06)":"rgba(64,196,255,.04)",border:"1px solid rgba(64,196,255,.18)",borderRadius:8,padding:8,marginBottom:5 }}>
                <div style={{ fontSize:9,color:"#40c4ff",fontWeight:700,marginBottom:4 }}>MOLECULAR STRUCTURE</div>
                <div style={{ display:"flex",justifyContent:"center",gap:14,flexWrap:"wrap" }}>
                  {prods.slice(0,3).map(function(p,i) {
                    return <MoleculeView key={i} molKey={p} T={T}/>;
                  })}
                </div>
              </div>
            );
          })()}
          <div style={{ display:"flex",gap:4,marginBottom:5 }}>
            <div style={{ flex:1,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.04)",borderRadius:5,padding:5,textAlign:"center" }}>
              <div style={{ fontSize:15 }}>{result.temp==="exo"?"🔥":result.temp==="endo"?"❄️":"--"}</div>
              <div style={{ fontSize:9,fontWeight:700,color:result.temp==="exo"?"#ff6a00":result.temp==="endo"?"#00bcd4":T.textMute }}>{result.temp==="exo"?"EXOTHERMIC":result.temp==="endo"?"ENDOTHERMIC":"NEUTRAL"}</div>
            </div>
            <div style={{ flex:1,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.04)",borderRadius:5,padding:5,textAlign:"center" }}>
              <div style={{ fontSize:13,color:scol(result.speed),fontWeight:700 }}>{sdots(result.speed)}</div>
              <div style={{ fontSize:9,fontWeight:700,color:scol(result.speed),marginTop:1 }}>{result.speed.toUpperCase()}</div>
            </div>
          </div>
          {result.pH !== null && <div style={{ background:"rgba(255,255,255,.02)",borderRadius:5,padding:6,marginBottom:5 }}>
            <div style={{ height:7,borderRadius:4,background:"linear-gradient(90deg,#ff1744,#ff5722,#ffab00,#cddc39,#76ff03,#00e5ff,#2979ff,#7c4dff)",position:"relative" }}>
              <div style={{ position:"absolute",left:(result.pH/14*100)+"%",top:-2,transform:"translateX(-50%)",width:7,height:11,borderRadius:4,border:"2px solid #fff",background:pHColor(result.pH),boxShadow:"0 0 5px "+pHColor(result.pH) }} />
            </div>
            <div style={{ fontSize:11,color:pHColor(result.pH),fontWeight:700,marginTop:2 }}>pH {result.pH} - {pHLabel(result.pH)}</div>
          </div>}
          {result.safety && <div style={{ background:"rgba(255,183,77,.04)",border:"1px solid rgba(255,183,77,.08)",borderRadius:5,padding:6,marginBottom:5 }}>
            <div style={{ fontSize:9,color:"#ffb74d",fontWeight:700 }}>SAFETY</div>
            <p style={{ fontSize:11,color:T.text,lineHeight:1.4,margin:"2px 0 0" }}>{result.safety}</p>
          </div>}
          <div style={{ marginBottom:5 }}>
            <div style={{ fontSize:10,fontWeight:700,color:"#90caf9" }}>What Happened?</div>
            <p style={{ fontSize:12,color:T.text,lineHeight:1.5,margin:"2px 0 0" }}>{result.explain}</p>
          </div>
          <div style={{ background:"rgba(255,215,0,.04)",border:"1px solid rgba(255,215,0,.08)",borderRadius:5,padding:6,marginBottom:6 }}>
            <div style={{ fontSize:9,color:"#ffd700",fontWeight:700 }}>FUN FACT</div>
            <p style={{ fontSize:12,color:T.text,lineHeight:1.4,margin:"2px 0 0" }}>{result.fact}</p>
          </div>
          <button onClick={clearAll} style={{ width:"100%",padding:8,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.05)",borderRadius:5,color:T.textDim,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit" }}>Try Another</button>
        </div>}
      </div>}

      {tab === "log" && <div style={{ padding:14 }}>
        <div style={{ textAlign:"center",marginBottom:10 }}>
          <div style={{ fontSize:22,fontWeight:900,color:"#00e676" }}>{log.length}<span style={{ fontSize:14,color:T.textMute }}>/{RXN.length}</span></div>
          <div style={{ height:4,borderRadius:2,background:"rgba(255,255,255,.04)",marginTop:5,overflow:"hidden" }}><div style={{ height:"100%",borderRadius:2,background:"linear-gradient(90deg,#00e676,#00c853)",width:(log.length/RXN.length*100)+"%" }} /></div>
        </div>
        {RXN.map(function(r,ri) {
          var key = r.r.slice().sort().join("+");
          var found = log.indexOf(key) !== -1;
          return <div key={ri} style={{ display:"flex",alignItems:"center",gap:5,padding:"5px 7px",marginBottom:2,background:found?"rgba(0,230,118,.04)":"rgba(255,255,255,.01)",border:"1px solid "+(found?"rgba(0,230,118,.08)":"rgba(255,255,255,.02)"),borderRadius:5,opacity:found?1:0.3 }}>
            <span style={{ fontSize:13 }}>{found?"✅":"🔒"}</span>
            <div style={{ flex:1 }}><div style={{ fontSize:11,fontWeight:700,color:found?T.text:T.textMute }}>{found?r.name:"???"}</div></div>
            {found && <span style={{ fontSize:10,color:"#00e676",fontWeight:700 }}>{r.score}</span>}
          </div>;
        })}
      </div>}

      {tab === "challenge" && <div style={{ padding:14 }}>
        <div style={{ textAlign:"center",marginBottom:10 }}>
          <div style={{ fontSize:22,fontWeight:900,color:"#ffd700" }}>{cDone.length}<span style={{ fontSize:14,color:T.textMute }}>/{CHALLENGES.length}</span></div>
        </div>
        {CHALLENGES.map(function(ch) {
          var s = cDone.indexOf(ch.id) !== -1;
          return <div key={ch.id} style={{ display:"flex",alignItems:"center",gap:6,padding:"7px 9px",marginBottom:3,background:s?"rgba(255,215,0,.05)":"rgba(255,255,255,.02)",border:"1px solid "+(s?"rgba(255,215,0,.1)":"rgba(255,255,255,.04)"),borderRadius:7 }}>
            <span style={{ fontSize:17 }}>{s?"🏆":"🎯"}</span>
            <div><div style={{ fontSize:12,fontWeight:700,color:s?"#ffd700":T.text }}>{ch.text}</div><div style={{ fontSize:9,color:T.textMute }}>{s?"Done!":"Go to Lab"}</div></div>
          </div>;
        })}
      </div>}

      {tab === "badges" && <div style={{ padding:14 }}>
        <div style={{ textAlign:"center",marginBottom:10 }}>
          <div style={{ fontSize:22,fontWeight:900,color:"#ffd700" }}>{earnedAch.length}<span style={{ fontSize:14,color:T.textMute }}>/{ACHIEVEMENTS.length}</span></div>
        </div>
        {ACHIEVEMENTS.map(function(a) {
          var earned = a.check(log);
          return <div key={a.id} style={{ display:"flex",alignItems:"center",gap:8,padding:"8px 10px",marginBottom:3,background:earned?"rgba(255,215,0,.06)":"rgba(255,255,255,.015)",border:"1px solid "+(earned?"rgba(255,215,0,.15)":"rgba(255,255,255,.03)"),borderRadius:8,opacity:earned?1:0.4 }}>
            <span style={{ fontSize:22 }}>{earned?a.icon:"🔒"}</span>
            <div><div style={{ fontSize:13,fontWeight:700,color:earned?"#ffd700":T.textDim }}>{a.title}</div><div style={{ fontSize:11,color:T.textDim }}>{a.desc}</div></div>
          </div>;
        })}
      </div>}

      {tab === "stats" && <div style={{ padding:14 }}>
        <div style={{ fontSize:17,color:"#ffd700",fontWeight:700,marginBottom:10,textAlign:"center" }}>YOUR STATS</div>
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:14 }}>
          <div style={{ background:"rgba(0,230,118,.06)",border:"1px solid rgba(0,230,118,.15)",borderRadius:10,padding:12,textAlign:"center" }}>
            <div style={{ fontSize:24,fontWeight:900,color:"#00e676" }}>{totalScore}</div>
            <div style={{ fontSize:10,color:T.textDim }}>SCORE</div>
          </div>
          <div style={{ background:"rgba(64,196,255,.06)",border:"1px solid rgba(64,196,255,.15)",borderRadius:10,padding:12,textAlign:"center" }}>
            <div style={{ fontSize:24,fontWeight:900,color:"#40c4ff" }}>{log.length}</div>
            <div style={{ fontSize:10,color:T.textDim }}>REACTIONS</div>
          </div>
          <div style={{ background:"rgba(255,215,0,.06)",border:"1px solid rgba(255,215,0,.15)",borderRadius:10,padding:12,textAlign:"center" }}>
            <div style={{ fontSize:24,fontWeight:900,color:"#ffd700" }}>{earnedAch.length}</div>
            <div style={{ fontSize:10,color:T.textDim }}>BADGES</div>
          </div>
        </div>
        <div style={{ background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",borderRadius:10,padding:12,marginBottom:12 }}>
          <div style={{ fontSize:13,fontWeight:700,color:"#ffd700",marginBottom:6 }}>TIMED CHALLENGE</div>
          <div style={{ fontSize:12,color:T.text,marginBottom:8 }}>Find as many reactions in 60 seconds!</div>
          {timedBest !== null && <div style={{ fontSize:15,color:"#00e676",fontWeight:700,marginBottom:8 }}>Best: {timedBest} reactions</div>}
          {!timedActive && <button onClick={function(){startTimed();setTab("lab")}} style={{ width:"100%",padding:10,background:"linear-gradient(135deg,#ffd700,#ff9100)",border:"none",borderRadius:8,fontSize:14,fontWeight:800,color:"#000",cursor:"pointer",fontFamily:"inherit" }}>START 60s CHALLENGE</button>}
        </div>
        <div style={{ fontSize:12,fontWeight:700,color:T.textDim,marginBottom:6 }}>TOP SCORES</div>
        {RXN.filter(function(r){return log.indexOf(r.r.slice().sort().join("+"))!==-1}).sort(function(a,b){return b.score-a.score}).slice(0,10).map(function(r,i) {
          return <div key={i} style={{ display:"flex",alignItems:"center",gap:6,padding:"5px 8px",marginBottom:2,background:"rgba(255,255,255,.02)",borderRadius:5 }}>
            <span style={{ fontSize:13,fontWeight:900,color:i===0?"#ffd700":i===1?T.text:T.textDim,width:16 }}>#{i+1}</span>
            <span style={{ flex:1,fontSize:11,color:T.text }}>{r.name}</span>
            <span style={{ fontSize:12,fontWeight:700,color:"#00e676" }}>{r.score}</span>
          </div>;
        })}
        {log.length === 0 && <div style={{ textAlign:"center",color:T.textMute,fontSize:13,padding:20 }}>No reactions yet! Go experiment!</div>}
      </div>}
    </div>
  );
}

var CSS = [
  "*{box-sizing:border-box;margin:0;padding:0}",
  "body{margin:0;background:#060710}",
  "button:active{transform:scale(.97)}",
  "@keyframes popIn{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}",
  "@keyframes fadeUp{0%{transform:translateY(16px);opacity:0}100%{transform:translateY(0);opacity:1}}",
  "@keyframes shake{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}",
  "@keyframes hintPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0)}50%{box-shadow:0 0 0 4px rgba(0,230,118,.15)}}",
  "@keyframes slideDown{0%{transform:translate(-50%,-30px);opacity:0}100%{transform:translate(-50%,0);opacity:1}}",
  "::-webkit-scrollbar{display:none}",
].join("\n");


/* ═══ MAIN MENU + APP SHELL ═══ */
function MainMenu(props) {
  var isLight = props.theme === "light";
  var bgGrad = isLight
    ? "radial-gradient(ellipse at center,#f5f8fc 0%,#dde6f0 70%)"
    : "radial-gradient(ellipse at center,#0d1226 0%,#060710 70%)";
  var subColor = isLight ? "#5a6378" : "#7a8599";
  var footColor = isLight ? "#8a94a6" : "#4a5266";
  return (
    <div style={{ position:"fixed",inset:0,background:bgGrad,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Courier New',monospace",padding:24 }}>
      <button
        onClick={function(){props.setTheme(isLight?"dark":"light")}}
        style={{ position:"absolute",top:16,right:16,width:38,height:38,borderRadius:"50%",border:"1px solid "+(isLight?"rgba(0,0,0,.15)":"rgba(255,255,255,.15)"),background:isLight?"rgba(255,255,255,.6)":"rgba(255,255,255,.05)",fontSize:16,cursor:"pointer",fontFamily:"inherit" }}
      >{isLight?"☀":"🌙"}</button>

      <div style={{ fontSize:78,animation:"float 2.4s ease-in-out infinite",filter:"drop-shadow(0 0 22px rgba(0,230,118,.55))" }}>⚗️</div>
      <div style={{ marginTop:20,fontSize:28,fontWeight:900,letterSpacing:4,color:"#00e676",textShadow:"0 0 16px rgba(0,230,118,.6)",textAlign:"center" }}>LAB CRAFT</div>
      <div style={{ marginTop:6,fontSize:14,letterSpacing:3,color:subColor }}>MIX • REACT • DISCOVER</div>

      <button
        onClick={props.onPlay}
        style={{
          marginTop:54,padding:"18px 64px",
          background:"linear-gradient(135deg,#00e676,#00b248)",
          border:"none",borderRadius:14,
          fontSize:18,fontWeight:900,letterSpacing:3,color:"#000",
          cursor:"pointer",fontFamily:"inherit",
          animation:"glow 2.2s ease-in-out infinite"
        }}
      >▶ PLAY</button>

      <div style={{ marginTop:48,fontSize:12,color:footColor,letterSpacing:2 }}>v1.0 • 118 elements • 100+ reactions</div>
    </div>
  );
}

function LoadingDialog(props) {
  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(6,7,16,.92)",backdropFilter:"blur(4px)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Courier New',monospace",zIndex:10000 }}>
      <div style={{ width:48,height:48,border:"3px solid rgba(0,230,118,.15)",borderTopColor:"#00e676",borderRadius:"50%",animation:"spin 1s linear infinite" }}/>
      <div style={{ marginTop:18,fontSize:15,fontWeight:700,color:"#00e676",letterSpacing:2 }}>{props.message || "LOADING..."}</div>
      {props.sub && <div style={{ marginTop:6,fontSize:12,color:"#7a8599",letterSpacing:1 }}>{props.sub}</div>}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("menu"); // "menu" | "loading" | "lab"
  const [theme, setTheme] = useState("dark");
  const screenRef = useRef(screen);
  useEffect(function() { screenRef.current = screen; }, [screen]);

  // Lowest-priority back handler: lab → menu, menu → exit
  useEffect(function() {
    return window.pushBackHandler(function() {
      var s = screenRef.current;
      if (s === "lab") { setScreen("menu"); return true; }
      // On menu (or loading): let the native exit happen
      return false;
    });
  }, []);

  const handlePlay = useCallback(function() {
    setScreen("loading");
    // Defer mount so the loading dialog actually paints before the heavy
    // LabCraft component initializes (it builds 118 elements + reactions).
    setTimeout(function() {
      setScreen("lab");
    }, 50);
  }, []);

  if (screen === "menu") return <MainMenu onPlay={handlePlay} theme={theme} setTheme={setTheme} />;
  if (screen === "loading") return <LoadingDialog message="PREPARING LAB" sub="Setting up elements & reactions" />;
  return <LabCraft theme={theme} setTheme={setTheme} />;
}

// Mount the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

</script>

</body>
